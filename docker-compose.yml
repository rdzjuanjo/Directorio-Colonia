services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: colonia
      POSTGRES_PASSWORD: colonia
      POSTGRES_DB: gestor_colonia
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  mosquitto:
    image: eclipse-mosquitto:2
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./mosquitto/config:/mosquitto/config
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log

volumes:
  postgres_data:
  redis_data:
  mosquitto_data:
  mosquitto_log:
